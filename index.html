<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14171b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Trening — plan FBW z ochroną lędźwi</title>
<style>
:root{
  --bg:#14171b; --panel:#1d2127; --panel2:#232830; --line:#2e343d;
  --text:#e9ebee; --muted:#9aa3ad; --faint:#6b7480;
  --accent:#e8a13d; --accent-deep:#c9831f;
  --safe:#5fb878; --warn:#e4c05c; --block:#d96c5f;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:16px; line-height:1.45; height:100%;}
body{padding-bottom:calc(170px + env(safe-area-inset-bottom));}
body.flash{animation:flashbg .9s ease}
@keyframes flashbg{0%,100%{background:var(--bg)}30%{background:#4a3510}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

h1,h2,h3{margin:0 0 .4em; font-weight:700; letter-spacing:-.01em}
h1{font-size:1.5rem} h2{font-size:1.15rem} h3{font-size:1rem}
p{margin:.3em 0}
.eyebrow{font-size:.7rem; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); font-weight:600}
.muted{color:var(--muted)} .small{font-size:.85rem} .tiny{font-size:.75rem}

.screen{display:none; padding:18px 16px 24px; max-width:640px; margin:0 auto}
.screen.active{display:block}

.card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px 14px; margin:10px 0}
.card.sub{background:var(--panel2)}

button{font:inherit; color:inherit; border:none; cursor:pointer; border-radius:12px}
.btn{display:block; width:100%; padding:14px; background:var(--accent); color:#1a1408;
  font-weight:700; font-size:1.05rem; border-radius:12px}
.btn:active{background:var(--accent-deep)}
.btn.secondary{background:var(--panel2); color:var(--text); border:1px solid var(--line); font-weight:600}
.btn.small{width:auto; padding:8px 14px; font-size:.9rem; display:inline-block}
.btn.danger{background:transparent; color:var(--block); border:1px solid var(--block)}
.btn:disabled{opacity:.4}

.seg{display:flex; background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:3px; margin:8px 0}
.seg button{flex:1; padding:9px 6px; background:transparent; color:var(--muted); font-weight:600; border-radius:9px; font-size:.95rem}
.seg button.on{background:var(--accent); color:#1a1408}

.tag{display:inline-block; padding:2px 9px; border-radius:999px; font-size:.7rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em}
.tag.safe{background:rgba(95,184,120,.15); color:var(--safe)}
.tag.warn{background:rgba(228,192,92,.15); color:var(--warn)}
.tag.block{background:rgba(217,108,95,.15); color:var(--block)}
.tag.plain{background:var(--panel2); color:var(--muted); border:1px solid var(--line)}

.spine-tip{display:flex; gap:8px; align-items:flex-start; background:rgba(232,161,61,.08);
  border-left:3px solid var(--accent); padding:8px 10px; border-radius:0 8px 8px 0; margin:8px 0; font-size:.85rem}
.spine-tip svg{flex:none; margin-top:2px}

nav#tabs{position:fixed; bottom:0; left:0; right:0; display:flex; background:#101317;
  border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); z-index:50}
nav#tabs button{flex:1; background:none; color:var(--faint); padding:9px 2px 7px; font-size:.68rem;
  display:flex; flex-direction:column; align-items:center; gap:3px; border-radius:0; font-weight:600}
nav#tabs button.on{color:var(--accent)}
nav#tabs svg{width:22px; height:22px}

input[type=number],input[type=text],textarea,select{
  width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--text);
  border-radius:10px; padding:10px 10px; font:inherit}
input[type=number]{text-align:center}
textarea{min-height:70px; resize:vertical}
label.fld{display:block; margin:10px 0}
label.fld span{display:block; font-size:.78rem; color:var(--muted); margin-bottom:4px}

.setrow{display:grid; grid-template-columns:34px 1fr 1fr 1fr 40px; gap:6px; align-items:center; margin:6px 0}
.setrow .n{color:var(--muted); font-size:.85rem; text-align:center}
.setrow .del{background:none; color:var(--faint); font-size:1.1rem; padding:6px}
.sethead{display:grid; grid-template-columns:34px 1fr 1fr 1fr 40px; gap:6px; font-size:.68rem;
  color:var(--faint); text-transform:uppercase; letter-spacing:.05em; text-align:center; margin-top:8px}

.timerbar{display:flex; align-items:center; gap:10px; background:var(--panel2); border:1px solid var(--line);
  border-radius:12px; padding:10px 12px; margin:8px 0}
.timerbar .t{font-variant-numeric:tabular-nums; font-size:1.5rem; font-weight:700; min-width:86px}
.timerbar.hot{border-color:var(--accent)}
.timerbar.done{border-color:var(--safe)}

#stickyTimer{position:fixed; left:12px; right:12px; bottom:calc(70px + env(safe-area-inset-bottom));
  background:#20242b; border:1px solid var(--accent); border-radius:14px; padding:10px 14px;
  display:none; align-items:center; gap:12px; z-index:60; box-shadow:0 8px 24px rgba(0,0,0,.5); max-width:616px; margin:0 auto}
#stickyTimer.show{display:flex}
#stickyTimer .t{font-size:1.6rem; font-weight:800; font-variant-numeric:tabular-nums}

.exdrawing{background:var(--panel2); border-radius:10px; padding:6px; margin:8px 0; text-align:center}
.exdrawing svg{max-width:100%; height:auto}

.range-wrap{margin:14px 0}
.range-wrap output{font-weight:800; font-size:1.3rem; color:var(--accent); margin-left:8px}
input[type=range]{width:100%; accent-color:var(--accent)}

.chartbox{background:var(--panel2); border-radius:10px; padding:8px; margin:8px 0; overflow-x:auto}
.chartbox svg{display:block}

.exlist-item{display:flex; justify-content:space-between; align-items:center; gap:8px;
  padding:11px 4px; border-bottom:1px solid var(--line)}
.exlist-item:last-child{border-bottom:none}
.exlist-item .nm{font-weight:600}
.exlist-item .sub{font-size:.75rem; color:var(--muted)}

details{border-top:1px solid var(--line); margin-top:8px; padding-top:6px}
details.expl{border-top:none; margin:0; padding:0; border-bottom:1px solid var(--line)}
details.expl:last-of-type{border-bottom:none}
details.expl summary{color:inherit; font-size:inherit; font-weight:inherit; padding:0}
details.expl summary::before{content:none}
details.expl summary::-webkit-details-marker{display:none}
input[type=number],select,button{min-height:42px}
summary{cursor:pointer; color:var(--muted); font-size:.85rem; font-weight:600; list-style:none}
summary::before{content:"▸ "; color:var(--accent)}
details[open] summary::before{content:"▾ "}

.notice{border:1px solid var(--warn); background:rgba(228,192,92,.07); border-radius:12px; padding:10px 12px; font-size:.85rem; margin:10px 0}
.notice.red{border-color:var(--block); background:rgba(217,108,95,.08)}
.hr{height:1px; background:var(--line); margin:12px 0}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:8px}
.statgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 0}
.stat{background:var(--panel2); border-radius:10px; padding:10px; text-align:center}
.stat b{display:block; font-size:1.3rem}
.stat span{font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em}
.filters{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0}
.filters select{width:auto; flex:1; min-width:100px; font-size:.85rem; padding:8px}
.suggest{border-left:3px solid var(--safe); background:rgba(95,184,120,.07); padding:8px 10px; border-radius:0 8px 8px 0; font-size:.85rem; margin:6px 0}
.suggest.down{border-color:var(--block); background:rgba(217,108,95,.07)}
</style>
</head>

/* ============ ILUSTRACJE SVG (sylwetka: pozycja startowa -> końcowa) ============ */
function fig(p,color){
  let s='';
  const L=(pts)=>'<polyline points="'+pts.map(q=>q.join(',')).join(' ')+'" fill="none" stroke="'+color+'" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>';
  s+='<circle cx="'+p.hd[0]+'" cy="'+p.hd[1]+'" r="6" fill="none" stroke="'+color+'" stroke-width="3.5"/>';
  s+=L([p.sh,p.hp]);
  if(p.el&&p.ha) s+=L([p.sh,p.el,p.ha]);
  if(p.el2&&p.ha2) s+=L([p.sh,p.el2,p.ha2]);
  if(p.kn&&p.ft) s+=L([p.hp,p.kn,p.ft]);
  if(p.kn2&&p.ft2) s+=L([p.hp,p.kn2,p.ft2]);
  if(p.extra) s+=p.extra;
  return s;
}

/* ============ SYGNAŁY: WIBRACJE + FALLBACK ============ */
const WZORY={przerwa:[250],cwiczenie:[220,130,220],cardio:[800]};
let audioCtx=null;
function beep(n,dur){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    for(let i=0;i<n;i++){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=880;o.connect(g);g.connect(audioCtx.destination);
      const t=audioCtx.currentTime+i*(dur/1000+0.15);
      g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(0.25,t+0.02);
      g.gain.linearRampToValueAtTime(0.001,t+dur/1000);
      o.start(t);o.stop(t+dur/1000+0.05);
    }
  }catch(e){}
}
function sygnal(typ){
  const ok=S.ust.wibracje && navigator.vibrate && navigator.vibrate(WZORY[typ]);
  if(!ok){ // fallback dźwięk + mignięcie (iOS Safari nie wspiera Vibration API)
    beep(typ==='cwiczenie'?2:1, typ==='cardio'?700:250);
    document.body.classList.remove('flash'); void document.body.offsetWidth;
    document.body.classList.add('flash');
  }
}

/* ============ JEDEN GLOBALNY TIMER (pasek przyklejony) ============ */
let TIMER=null,tick=null;
const stEl=document.getElementById('stickyTimer'),
      stTime=document.getElementById('stickyTime'),
      stLabel=document.getElementById('stickyLabel');
document.getElementById('stickyStop').onclick=()=>stopTimer(true);
function startTimer(cfg){ // {label, sec (countdown) | up:true, alertAt, sygnal, onEnd}
  stopTimer(false);
  TIMER={...cfg,start:Date.now(),alerted:false};
  stEl.classList.add('show');
  tick=setInterval(tikTimer,250); tikTimer();
}
function tikTimer(){
  if(!TIMER) return;
  const el=(Date.now()-TIMER.start)/1000;
  if(TIMER.up){
    stTime.textContent=fmtT(el);
    stLabel.textContent=TIMER.label;
    if(TIMER.alertAt&&el>=TIMER.alertAt&&!TIMER.alerted){
      TIMER.alerted=true; sygnal('cardio');
      stLabel.textContent='⚠ '+TIMER.alertMsg;
      if(TIMER.onAlert) TIMER.onAlert();
    }
  }else{
    const left=TIMER.sec-el;
    stTime.textContent=fmtT(left);
    stLabel.textContent=TIMER.label;
    if(left<=0){ const s=TIMER.sygnal,cb=TIMER.onEnd; stopTimer(false); sygnal(s); if(cb)cb(); }
  }
}
function stopTimer(manual){
  if(tick){clearInterval(tick);tick=null;}
  const t=TIMER; TIMER=null; stEl.classList.remove('show');
  if(manual&&t&&t.onStop) t.onStop((Date.now()-t.start)/1000);
}

function ostatnieWpisy(exId,ile){
  const out=[];
  for(let i=S.sesje.length-1;i>=0&&out.length<ile;i--){
    const w=S.sesje[i].wpisy[exId];
    if(w&&w.length) out.push({sesja:S.sesje[i],serie:w});
  }
  return out;
}
function poprzedniTekst(ex){
  const o=ostatnieWpisy(ex.id,1);
  if(!o.length) return '';
  const s=o[0].serie.map(x=>{
    if(ex.typ==='t') return x.p+' s';
    if(ex.typ==='r') return x.p+' powt.';
    return (x.c||0)+'×'+x.p;
  }).join(', ');
  return 'Poprzednio ('+o[0].sesja.data+'): '+s;
}
function sugestiaDlaCwiczenia(ex,slot){
  if(ex.typ!=='w') return null;
  const o=ostatnieWpisy(ex.id,2);
  if(o.length<2) return null;
  const top=o.every(x=>x.serie.length>=slot.serie&&x.serie.every(s=>s.p>=slot.do&&(s.rpe||10)<=8));
  if(top) return {kier:'up',txt:'Dwie sesje z górą zakresu przy RPE ≤ 8. Dołóż +2,5-5 kg (siłownia) albo weź mocniejszą gumę (dom).'};
  return null;
}
function sugestiaBolu(){

function tonaz(w){
  let t=0;
  Object.keys(w).forEach(id=>{
    const ex=EXBYID[id]; if(!ex||ex.typ!=='w') return;
    w[id].forEach(s=>{ t+=(Number(s.c)||0)*(Number(s.p)||0); });
  });
  return Math.round(t);
}
function renderPodsumowanie(){
  const s=tmpSesja; if(!s) return renderDzis();

   '<div class="stat"><b>'+s.czas+' min</b><span>czas</span></div>'+

   '<div class="range-wrap"><label>Ból kręgosłupa <output id="oBol">'+s.bol+'</output>/10</label>'+
   '<input type="range" min="0" max="10" value="'+s.bol+'" oninput="tmpSesja.bol=+this.value;document.getElementById(\'oBol\').textContent=this.value"></div>'+

function liniowy(pkt,opt){ // pkt: [{x:label,y:val}]
  const W=Math.max(300,pkt.length*44),H=150,pad=26,maxY=Math.max(opt.maxY||0,...pkt.map(p=>p.y),1);
  const X=i=>pad+i*( (W-pad-8)/Math.max(1,pkt.length-1) );
  const Y=v=>H-pad-(v/maxY)*(H-pad-16);
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">';
  [0,.5,1].forEach(f=>{const y=Y(maxY*f);
    s+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-6)+'" y2="'+y+'" stroke="#2e343d"/>'+
       '<text x="2" y="'+(y+3)+'" fill="#6b7480" font-size="9">'+Math.round(maxY*f)+'</text>';});
  if(pkt.length>1) s+='<polyline points="'+pkt.map((p,i)=>X(i)+','+Y(p.y)).join(' ')+'" fill="none" stroke="'+opt.kolor+'" stroke-width="2.5"/>';
  pkt.forEach((p,i)=>{ s+='<circle cx="'+X(i)+'" cy="'+Y(p.y)+'" r="3.5" fill="'+opt.kolor+'"/>'+
    '<text x="'+X(i)+'" y="'+(H-8)+'" fill="#6b7480" font-size="8" text-anchor="middle">'+p.x+'</text>'; });
  return s+'</svg>';
}
function slupki(pkt,opt){
  const W=Math.max(300,pkt.length*52),H=150,pad=26,maxY=Math.max(opt.maxY||0,...pkt.map(p=>p.y),1);
  const bw=Math.min(30,(W-pad)/pkt.length-10);
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">';
  [0,.5,1].forEach(f=>{const y=H-24-f*(H-46);
    s+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-6)+'" y2="'+y+'" stroke="#2e343d"/>'+
       '<text x="2" y="'+(y+3)+'" fill="#6b7480" font-size="9">'+Math.round(maxY*f)+'</text>';});
  pkt.forEach((p,i)=>{
    const x=pad+8+i*((W-pad-12)/pkt.length), hh=(p.y/maxY)*(H-46);
    s+='<rect x="'+x+'" y="'+(H-24-hh)+'" width="'+bw+'" height="'+Math.max(1,hh)+'" rx="3" fill="'+opt.kolor+'"/>'+
       '<text x="'+(x+bw/2)+'" y="'+(H-8)+'" fill="#6b7480" font-size="8" text-anchor="middle">'+p.x+'</text>';
    if(opt.linia!=null) ;
  });
  if(opt.linia!=null){const y=H-24-(opt.linia/maxY)*(H-46);
    s+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-6)+'" y2="'+y+'" stroke="#5fb878" stroke-dasharray="4 3"/>';}
  return s+'</svg>';
}
function tydzien(d){ // ISO tydzień jako etykieta
  const dt=new Date(d), on=new Date(dt); on.setDate(dt.getDate()-((dt.getDay()+6)%7));
  return on.toISOString().slice(5,10);
}
function rysujWykresy(){
  if(!S.sesje.length) return;
  if(!document.getElementById('chTonaz')) return;
  const sel=document.getElementById('selEx');
  if(sel){
    const id=sel.value;
    const pkt=S.sesje.filter(s=>s.wpisy[id]).map(s=>({x:s.data.slice(5),
      y:Math.max(...s.wpisy[id].map(x=>Number(x.c)||0))}));
    document.getElementById('chEx').innerHTML=liniowy(pkt,{kolor:'#e8a13d'});
  }
  const tyg={};
  S.sesje.forEach(s=>{const t=tydzien(s.data); tyg[t]=tyg[t]||{ton:0,ile:0};
    tyg[t].ton+=tonaz(s.wpisy); tyg[t].ile++;});
  const kl=Object.keys(tyg);
  document.getElementById('chTonaz').innerHTML=slupki(kl.map(k=>({x:k,y:tyg[k].ton})),{kolor:'#e8a13d'});
  document.getElementById('chIle').innerHTML=slupki(kl.map(k=>({x:k,y:tyg[k].ile})),{kolor:'#5fb878',maxY:4,linia:3});
  document.getElementById('chBol').innerHTML=liniowy(S.sesje.map(s=>({x:s.data.slice(5),y:s.bol||0})),{kolor:'#d96c5f',maxY:10});
}

let FIL={partia:'',sprzet:'',safety:''};
function renderBiblioteka(){
  const partie=[...new Set(EX.map(e=>e.partia))];
  let lista=EX.filter(e=>!(ostrozny()&&e.safety==='block'));
  if(FIL.partia) lista=lista.filter(e=>e.partia===FIL.partia);
  if(FIL.sprzet) lista=lista.filter(e=>e.sprzet.includes(FIL.sprzet));
  if(FIL.safety) lista=lista.filter(e=>e.safety===FIL.safety);
  let h='<p class="eyebrow">Biblioteka</p><h1>Ćwiczenia</h1>';
  if(ostrozny()) h+='<p class="tiny muted">🛡 Tryb ostrożny: ćwiczenia z czarnej listy są ukryte i nie da się ich dodać do planu.</p>';
  h+='<div class="filters">'+
   '<select onchange="FIL.partia=this.value;pokaz(\'biblioteka\')"><option value="">partia: wszystkie</option>'+partie.map(p=>'<option '+(FIL.partia===p?'selected':'')+'>'+p+'</option>').join('')+'</select>'+
   '<select onchange="FIL.sprzet=this.value;pokaz(\'biblioteka\')"><option value="">sprzęt: wszystko</option><option value="s" '+(FIL.sprzet==='s'?'selected':'')+'>siłownia</option><option value="d" '+(FIL.sprzet==='d'?'selected':'')+'>dom</option></select>'+
   '<select onchange="FIL.safety=this.value;pokaz(\'biblioteka\')"><option value="">bezpieczeństwo: wszystkie</option><option value="safe" '+(FIL.safety==='safe'?'selected':'')+'>bezpieczne</option><option value="warn" '+(FIL.safety==='warn'?'selected':'')+'>ostrożnie</option>'+(!ostrozny()?'<option value="block" '+(FIL.safety==='block'?'selected':'')+'>zablokowane</option>':'')+'</select></div>';
  lista.forEach(ex=>{
    h+='<div class="card"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">'+
      '<div><h3 style="margin-bottom:2px">'+esc(ex.nazwa)+'</h3><div class="tiny muted">'+esc(ex.en)+' · '+esc(ex.partia)+' · '+ex.sprzet.map(s=>s==='s'?'siłownia':'dom').join(' / ')+'</div></div>'+
      tagHTML(ex.safety)+'</div>';
    if(ex.safety==='block'){ h+=spineTip(ex.wsk); h+='</div>'; return; }
    h+='<div class="exdrawing">'+exFig(ex.fig,ex.typ==='t')+'</div>'+linkiPodgladu(ex,ex.sprzet.includes('s')?'s':'d')+opisHTML(ex)+spineTip(ex.wsk);
    const st=startText(ex,'s')||startText(ex,'d');
    if(st) h+='<p class="tiny muted">'+esc(st)+'</p>';
    h+='</div>';
  });
  return h;
}

/* ============ EKRAN: USTAWIENIA ============ */
function renderUstawienia(){
  const p=S.profil;
  let h='<p class="eyebrow">Ustawienia</p><h1>Ustawienia</h1>';
  h+='<div class="notice">Plan nie zastępuje konsultacji z lekarzem lub fizjoterapeutą. Po otrzymaniu wyniku MRI skonsultuj listę ćwiczeń.</div>';
  h+='<div class="card"><h3>Profil</h3><div class="row2">'+
   '<label class="fld"><span>Wzrost (cm)</span><input type="number" value="'+p.wzrost+'" onchange="S.profil.wzrost=+this.value;save()"></label>'+
   '<label class="fld"><span>Waga startowa (kg)</span><input type="number" step="0.1" value="'+p.waga+'" onchange="S.profil.waga=+this.value;save()"></label></div>'+
   '<p class="tiny muted">Cel: redukcja masy ciała, poprawa kondycji, wzmocnienie mięśni głębokich tułowia. Ograniczenie: obniżenie krążka L4-L5-S1, poziome ustawienie kości krzyżowej. 3 treningi FBW w tygodniu po ok. 90 min.</p></div>';

  h+='<div class="card"><h3>Tryb bezpieczeństwa</h3>'+
   '<p class="small muted">Ostrożny blokuje ćwiczenia obciążające osiowo odcinek lędźwiowy (m.in. martwy ciąg, przysiad ze sztangą, brzuszki, skoki) i pilnuje bloków cardio maks. 12 min.</p>'+
   '<div class="seg"><button class="'+(ostrozny()?'on':'')+'" onclick="zmienTryb(\'ostrozny\')">🛡 Ostrożny (do MRI)</button>'+
   '<button class="'+(!ostrozny()?'on':'')+'" onclick="zmienTryb(\'rozszerzony\')">Rozszerzony</button></div></div>';

  h+='<div class="card"><h3>Sygnały timerów</h3>'+
   '<div class="seg"><button class="'+(S.ust.wibracje?'on':'')+'" onclick="S.ust.wibracje=true;save();pokaz(\'ustawienia\')">Wibracje wł.</button>'+
   '<button class="'+(!S.ust.wibracje?'on':'')+'" onclick="S.ust.wibracje=false;save();pokaz(\'ustawienia\')">Wibracje wył.</button></div>'+
   '<p class="tiny muted">Wzory: krótka = koniec przerwy, podwójna = koniec ćwiczenia na czas, długa = koniec bloku cardio. Na iPhonie (Safari) wibracje nie działają w przeglądarce, więc aplikacja użyje dźwięku i mignięcia ekranu.</p>'+
   '<button class="btn small secondary" onclick="sygnal(\'cwiczenie\')">Przetestuj sygnał</button></div>';

  h+='<div class="card"><h3>Plan treningowy</h3><p class="small muted">Podmiana ćwiczeń i zakresów w treningach A/B/C.</p>'+
   '<button class="btn small secondary" onclick="pokaz(\'planedycja\')">Edytuj plan</button>'+
   (S.planOverride?' <button class="btn small secondary" onclick="if(confirm(\'Przywrócić domyślny plan?\')){S.planOverride=null;save();pokaz(\'ustawienia\')}">Przywróć domyślny</button>':'')+'</div>';

  h+='<div class="card"><h3>Dane</h3><p class="small muted">Wszystko trzymasz lokalnie na telefonie ('+S.sesje.length+' zapisanych sesji). Rób backup po każdym tygodniu.</p>'+
   '<div class="row2"><button class="btn small secondary" style="width:100%" onclick="eksport(\'json\')">Eksport JSON</button>'+
   '<button class="btn small secondary" style="width:100%" onclick="eksport(\'csv\')">Eksport CSV</button></div>'+
   '<label class="fld" style="margin-top:10px"><span>Import z pliku JSON</span><input type="file" accept=".json" onchange="importuj(this)"></label>'+
   '<button class="btn danger" style="margin-top:8px" onclick="if(confirm(\'Skasować WSZYSTKIE dane? Tego nie da się cofnąć.\')){MAG.del(KEY);location.reload()}">Wyczyść wszystkie dane</button></div>';
  return h;
}
function zmienTryb(t){
  if(t==='rozszerzony'&&ostrozny()){
    if(!confirm('Tryb rozszerzony odblokowuje ćwiczenia z czarnej listy (martwy ciąg, przysiad ze sztangą itd.).\n\nWłącz go dopiero po konsultacji wyniku MRI z lekarzem lub fizjoterapeutą. Potwierdzasz, że taka konsultacja się odbyła?')) return;
  }
  S.profil.tryb=t; save(); pokaz('ustawienia');
}
function eksport(fmt){
  let blob,nazwa;
  if(fmt==='json'){
    blob=new Blob([JSON.stringify({profil:S.profil,sesje:S.sesje,planOverride:S.planOverride},null,2)],{type:'application/json'});
    nazwa='trening-backup-'+dziś()+'.json';
  }else{
    let csv='data;typ;wariant;cwiczenie;seria;ciezar;powtorzenia_lub_sek;rpe;czas_min;cardio_min;samopoczucie;bol;notatka\n';
    S.sesje.forEach(s=>{
      const cm=s.cardio.reduce((a,c)=>a+c.min,0);
      Object.keys(s.wpisy).forEach(id=>s.wpisy[id].forEach((x,i)=>{
        csv+=[s.data,s.typ,s.wariant,(EXBYID[id]?EXBYID[id].nazwa:id),i+1,x.c??'',x.p??'',x.rpe??'',s.czas,cm,s.samopoczucie,s.bol,'"'+String(s.notatka||'').replace(/"/g,'""')+'"'].join(';')+'\n';
      }));
    });
    blob=new Blob(['\ufeff'+csv],{type:'text/csv'});
    nazwa='trening-'+dziś()+'.csv';
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=nazwa; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
function importuj(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      if(!d.sesje||!d.profil) throw 0;
      if(confirm('Wczytać backup? Nadpisze '+S.sesje.length+' obecnych sesji danymi z pliku ('+d.sesje.length+' sesji).')){
        S.profil=d.profil; S.sesje=d.sesje; S.planOverride=d.planOverride||null; save(); pokaz('ustawienia');
      }
    }catch(e){ alert('To nie wygląda na poprawny plik backupu.'); } };
  r.readAsText(f);
}

/* ============ EKRAN: EDYCJA PLANU ============ */
function renderPlanEdycja(){
  const pl=plan();
  const opcje=(sprzet,wybrane)=>EX
    .filter(e=>e.sprzet.includes(sprzet)&&!(ostrozny()&&e.safety==='block'))
    .map(e=>'<option value="'+e.id+'" '+(e.id===wybrane?'selected':'')+'>'+esc(e.nazwa)+(e.safety==='warn'?' ⚠':'')+'</option>').join('');
  let h='<p class="eyebrow">Ustawienia</p><h1>Edycja planu</h1>'+
   '<p class="small muted">Ćwiczenia z czarnej listy nie pojawiają się na listach w trybie ostrożnym. Zmiany zapisują się od razu.</p>';
  ['A','B','C'].forEach(t=>{
    h+='<div class="card"><h3>'+pl[t].nazwa+'</h3>';
    pl[t].lista.forEach((slot,i)=>{
      h+='<div class="card sub" style="padding:10px">'+
       '<label class="fld"><span>Siłownia</span><select onchange="edytujSlot(\''+t+'\','+i+',\'s\',this.value)">'+opcje('s',slot.s)+'</select></label>'+
       '<label class="fld"><span>Dom</span><select onchange="edytujSlot(\''+t+'\','+i+',\'d\',this.value)">'+opcje('d',slot.d)+'</select></label>'+
       '<div class="row2"><label class="fld"><span>Serie</span><input type="number" min="1" max="6" value="'+slot.serie+'" onchange="edytujSlot(\''+t+'\','+i+',\'serie\',+this.value)"></label>'+
       '<div class="row2"><label class="fld"><span>Od</span><input type="number" value="'+slot.od+'" onchange="edytujSlot(\''+t+'\','+i+',\'od\',+this.value)"></label>'+
       '<label class="fld"><span>Do</span><input type="number" value="'+slot.do+'" onchange="edytujSlot(\''+t+'\','+i+',\'do\',+this.value)"></label></div></div>'+
       '<button class="btn small danger" onclick="usunSlot(\''+t+'\','+i+')">Usuń ćwiczenie</button></div>';
    });
    h+='<button class="btn small secondary" onclick="dodajSlot(\''+t+'\')">+ Dodaj ćwiczenie</button></div>';
  });
  h+='<button class="btn secondary" onclick="pokaz(\'ustawienia\')">← Wróć do ustawień</button>';
  return h;
}
function zapewnijOverride(){
  if(!S.planOverride) S.planOverride=JSON.parse(JSON.stringify(PLAN));
  return S.planOverride;
}
function edytujSlot(t,i,pole,v){
  const pl=zapewnijOverride();
  if((pole==='s'||pole==='d')&&EXBYID[v]&&EXBYID[v].safety==='block'&&ostrozny()){
    alert('To ćwiczenie jest zablokowane w trybie ostrożnym.'); pokaz('planedycja'); return;
  }
  pl[t].lista[i][pole]=v; save();
}
function usunSlot(t,i){ const pl=zapewnijOverride(); pl[t].lista.splice(i,1); save(); pokaz('planedycja',true); }
function dodajSlot(t){ const pl=zapewnijOverride(); pl[t].lista.push({s:'dead-bug',d:'dead-bug',serie:3,od:8,do:10}); save(); pokaz('planedycja',true); }

/* ============ START ============ */
setInterval(()=>{ if(ekran==='trening'&&S.aktywna&&!TIMER){ /* odświeżenie zegara nagłówka */ 
  const e=document.querySelector('.eyebrow'); if(e) e.textContent='Trening w toku · '+fmtT((Date.now()-S.aktywna.start)/1000)+' od startu'; } },5000);
pokaz(S.aktywna?'trening':'dzis');
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
